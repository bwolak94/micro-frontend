# Minimal stack: shell + MFEs + BFF + postgres only.
# No observability, no redis. For quick demos.
#
# Usage:
#   docker compose -f docker-compose.minimal.yml up
services:
  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - shell
      - mfe-auth
      - mfe-dashboard
      - mfe-products
      - bff
    networks:
      - frontend
      - backend
    restart: unless-stopped

  shell:
    build:
      context: .
      dockerfile: apps/shell/Dockerfile
    networks:
      - frontend
    restart: unless-stopped

  mfe-auth:
    build:
      context: .
      dockerfile: apps/mfe-auth/Dockerfile
    networks:
      - frontend
    restart: unless-stopped

  mfe-dashboard:
    build:
      context: .
      dockerfile: apps/mfe-dashboard/Dockerfile
    networks:
      - frontend
    restart: unless-stopped

  mfe-products:
    build:
      context: .
      dockerfile: apps/mfe-products/Dockerfile
    networks:
      - frontend
    restart: unless-stopped

  bff:
    build:
      context: .
      dockerfile: apps/bff/Dockerfile
    environment:
      NODE_ENV: production
      PORT: '4000'
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mfe_portfolio
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars!!}
      CORS_ORIGINS: http://localhost
      COOKIE_SECURE: 'false'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mfe_portfolio
    volumes:
      - postgres_minimal_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d mfe_portfolio']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_minimal_data:

networks:
  frontend:
  backend:
