services:
  # ─── Reverse proxy ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - shell
      - mfe-auth
      - mfe-dashboard
      - mfe-products
      - bff
    networks:
      - frontend
      - backend
    restart: unless-stopped

  # ─── Frontend MFEs ──────────────────────────────────────────────────────────
  shell:
    build:
      context: .
      dockerfile: apps/shell/Dockerfile
    networks:
      - frontend
    restart: unless-stopped

  mfe-auth:
    build:
      context: .
      dockerfile: apps/mfe-auth/Dockerfile
    networks:
      - frontend
    restart: unless-stopped

  mfe-dashboard:
    build:
      context: .
      dockerfile: apps/mfe-dashboard/Dockerfile
    networks:
      - frontend
    restart: unless-stopped

  mfe-products:
    build:
      context: .
      dockerfile: apps/mfe-products/Dockerfile
    networks:
      - frontend
    restart: unless-stopped

  # ─── BFF ────────────────────────────────────────────────────────────────────
  bff:
    build:
      context: .
      dockerfile: apps/bff/Dockerfile
    environment:
      NODE_ENV: production
      PORT: '4000'
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mfe_portfolio
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars!!}
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: http://localhost
      COOKIE_SECURE: 'false'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - backend
    restart: unless-stopped

  # ─── Data stores ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mfe_portfolio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d mfe_portfolio']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - backend
    restart: unless-stopped

  # ─── Observability ──────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - backend
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.0.0
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./docker/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
    depends_on:
      - loki
    networks:
      - backend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - bff
    networks:
      - backend
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - '3100:3000'
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - loki
      - prometheus
    networks:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  frontend:
  backend:
