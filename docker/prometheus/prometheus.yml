global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: docker

scrape_configs:
  - job_name: bff
    static_configs:
      - targets: ['bff:4000']
    metrics_path: /metrics

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
    metrics_path: /metrics
